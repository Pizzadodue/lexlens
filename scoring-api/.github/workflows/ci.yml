name: CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck      # TypeScript strict mode — must pass
      - run: npm run audit          # Block on high/critical CVEs
      - run: npm test               # Unit tests
      - run: npm run build          # Ensure dist compiles clean
